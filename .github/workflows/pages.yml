name: Build recipe index

# Klassisches GitHub Pages liefert die Seite direkt aus dem main-Branch (Root) aus.
# Dieser Workflow baut nur recipes/index.json neu, sobald sich Rezepte ändern,
# und committet die aktualisierte Datei zurück. Ein eigener Deploy-Schritt ist
# dadurch nicht nötig.

on:
  push:
    branches: [main]
    paths:
      - "recipes/**"
      - "scripts/build-index.mjs"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build recipe index
        run: node scripts/build-index.mjs

      - name: Commit updated index
        run: |
          if git diff --quiet -- recipes/index.json; then
            echo "index.json unverändert – nichts zu committen."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add recipes/index.json
            git commit -m "chore: Rezept-Index neu gebaut [skip ci]"
            git push
          fi
